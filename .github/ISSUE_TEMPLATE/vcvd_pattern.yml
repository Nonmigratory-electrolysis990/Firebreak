name: New VCVD Pattern
description: Suggest a new vulnerability pattern for the VCVD database
labels: ["vcvd"]
body:
  - type: input
    id: name
    attributes:
      label: Pattern name
      placeholder: e.g. "Insecure Randomness for Tokens"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Auth & Identity
        - Data Access
        - Injection
        - Infrastructure
        - Frontend
        - Business Logic
        - API
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - CRITICAL
        - HIGH
        - MEDIUM
        - LOW
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What is this vulnerability and why does AI generate it?
    validations:
      required: true
  - type: textarea
    id: detection
    attributes:
      label: How to detect
      placeholder: Regex patterns, code examples, what to look for
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: How to fix
    validations:
      required: true
