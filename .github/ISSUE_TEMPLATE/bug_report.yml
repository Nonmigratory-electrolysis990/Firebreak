name: Bug Report
description: Report a bug in Firebreak
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the server
        2. Call tool X with arguments Y
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Firebreak version
      placeholder: v0.1.0
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
